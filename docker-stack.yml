# Docker Stack para Producao (Docker Swarm)
# Deploy: ./deploy.sh [tag]
# Requer: .env no mesmo diretorio com todas as variaveis configuradas

services:
  app:
    image: felipedaige/fiscaldock:${IMAGE_TAG:-0.0.3}
    networks:
      - network_public
    volumes:
      - ./.env:/var/www/html/.env:ro
      - app_storage:/var/www/html/storage
      - ./storage/logs:/var/www/html/storage/logs
    environment:
      # App
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://fiscaldock.com.br}
      ASSET_URL: ${ASSET_URL:-https://fiscaldock.com.br}
      APP_KEY: ${APP_KEY}

      # Database
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-fiscaldock}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}

      # Cache & Session
      CACHE_STORE: ${CACHE_STORE:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}

      # Redis (opcional)
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Proxy & Security
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-fiscaldock.com.br,www.fiscaldock.com.br}

      # Logging
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # API & Webhooks
      API_TOKEN: ${API_TOKEN}
      WEBHOOK_SPED_CONTRIBUICOES_URL: ${WEBHOOK_SPED_CONTRIBUICOES_URL}
      WEBHOOK_SPED_FISCAL_URL: ${WEBHOOK_SPED_FISCAL_URL}
      WEBHOOK_SPED_CONTRIBUICOES_COMPLETA_URL: ${WEBHOOK_SPED_CONTRIBUICOES_COMPLETA_URL}
      WEBHOOK_SPED_FISCAL_COMPLETA_URL: ${WEBHOOK_SPED_FISCAL_COMPLETA_URL}
      WEBHOOK_MONITORAMENTO_IMPORTACAO_CONTRIBUICOES_URL: ${WEBHOOK_MONITORAMENTO_IMPORTACAO_CONTRIBUICOES_URL}
      WEBHOOK_MONITORAMENTO_IMPORTACAO_FISCAL_URL: ${WEBHOOK_MONITORAMENTO_IMPORTACAO_FISCAL_URL}
      WEBHOOK_MONITORAMENTO_CONSULTA_URL: ${WEBHOOK_MONITORAMENTO_CONSULTA_URL}
      WEBHOOK_IMPORTACAO_XML_URL: ${WEBHOOK_IMPORTACAO_XML_URL}
      WEBHOOK_CONSULTAS_LOTES_URL: ${WEBHOOK_CONSULTAS_LOTES_URL}
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        # Habilitar Traefik
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"

        # Router HTTP principal (redireciona para HTTPS)
        - "traefik.http.routers.fiscaldock-main-http.rule=Host(`fiscaldock.com.br`)"
        - "traefik.http.routers.fiscaldock-main-http.entrypoints=web"
        - "traefik.http.routers.fiscaldock-main-http.middlewares=redirect-to-https"
        - "traefik.http.routers.fiscaldock-main-http.service=fiscaldock-service"

        # Router HTTP www (redireciona para HTTPS)
        - "traefik.http.routers.fiscaldock-www-http.rule=Host(`www.fiscaldock.com.br`)"
        - "traefik.http.routers.fiscaldock-www-http.entrypoints=web"
        - "traefik.http.routers.fiscaldock-www-http.middlewares=redirect-to-https"
        - "traefik.http.routers.fiscaldock-www-http.service=fiscaldock-service"

        # Router HTTPS principal (fiscaldock.com.br)
        - "traefik.http.routers.fiscaldock-main.rule=Host(`fiscaldock.com.br`)"
        - "traefik.http.routers.fiscaldock-main.entrypoints=websecure"
        - "traefik.http.routers.fiscaldock-main.tls=true"
        - "traefik.http.routers.fiscaldock-main.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.fiscaldock-main.service=fiscaldock-service"

        # Router HTTPS www (www.fiscaldock.com.br) - redireciona para non-www
        - "traefik.http.routers.fiscaldock-www.rule=Host(`www.fiscaldock.com.br`)"
        - "traefik.http.routers.fiscaldock-www.entrypoints=websecure"
        - "traefik.http.routers.fiscaldock-www.tls=true"
        - "traefik.http.routers.fiscaldock-www.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.fiscaldock-www.middlewares=www-to-nonwww"
        - "traefik.http.routers.fiscaldock-www.service=fiscaldock-service"

        # Middleware de redirecionamento HTTP -> HTTPS
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

        # Middleware de redirecionamento www -> non-www
        - "traefik.http.middlewares.www-to-nonwww.redirectregex.regex=^https://www\\.fiscaldock\\.com\\.br(.*)"
        - "traefik.http.middlewares.www-to-nonwww.redirectregex.replacement=https://fiscaldock.com.br$$1"
        - "traefik.http.middlewares.www-to-nonwww.redirectregex.permanent=true"

        # Service
        - "traefik.http.services.fiscaldock-service.loadbalancer.server.port=80"

  scheduler:
    image: felipedaige/fiscaldock:${IMAGE_TAG:-0.0.3}
    networks:
      - network_public
    volumes:
      - ./.env:/var/www/html/.env:ro
      - app_storage:/var/www/html/storage
      - ./storage/logs:/var/www/html/storage/logs
    command: php artisan schedule:work
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://fiscaldock.com.br}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-fiscaldock}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: ${CACHE_STORE:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-fiscaldock.com.br,www.fiscaldock.com.br}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_TOKEN: ${API_TOKEN}
      WEBHOOK_SPED_CONTRIBUICOES_URL: ${WEBHOOK_SPED_CONTRIBUICOES_URL}
      WEBHOOK_SPED_FISCAL_URL: ${WEBHOOK_SPED_FISCAL_URL}
      WEBHOOK_SPED_CONTRIBUICOES_COMPLETA_URL: ${WEBHOOK_SPED_CONTRIBUICOES_COMPLETA_URL}
      WEBHOOK_SPED_FISCAL_COMPLETA_URL: ${WEBHOOK_SPED_FISCAL_COMPLETA_URL}
      WEBHOOK_MONITORAMENTO_IMPORTACAO_CONTRIBUICOES_URL: ${WEBHOOK_MONITORAMENTO_IMPORTACAO_CONTRIBUICOES_URL}
      WEBHOOK_MONITORAMENTO_IMPORTACAO_FISCAL_URL: ${WEBHOOK_MONITORAMENTO_IMPORTACAO_FISCAL_URL}
      WEBHOOK_MONITORAMENTO_CONSULTA_URL: ${WEBHOOK_MONITORAMENTO_CONSULTA_URL}
      WEBHOOK_IMPORTACAO_XML_URL: ${WEBHOOK_IMPORTACAO_XML_URL}
      WEBHOOK_CONSULTAS_LOTES_URL: ${WEBHOOK_CONSULTAS_LOTES_URL}
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  worker:
    image: felipedaige/fiscaldock:${IMAGE_TAG:-0.0.3}
    networks:
      - network_public
    volumes:
      - ./.env:/var/www/html/.env:ro
      - app_storage:/var/www/html/storage
      - ./storage/logs:/var/www/html/storage/logs
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://fiscaldock.com.br}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-fiscaldock}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: ${CACHE_STORE:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-fiscaldock.com.br,www.fiscaldock.com.br}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_TOKEN: ${API_TOKEN}
      WEBHOOK_SPED_CONTRIBUICOES_URL: ${WEBHOOK_SPED_CONTRIBUICOES_URL}
      WEBHOOK_SPED_FISCAL_URL: ${WEBHOOK_SPED_FISCAL_URL}
      WEBHOOK_SPED_CONTRIBUICOES_COMPLETA_URL: ${WEBHOOK_SPED_CONTRIBUICOES_COMPLETA_URL}
      WEBHOOK_SPED_FISCAL_COMPLETA_URL: ${WEBHOOK_SPED_FISCAL_COMPLETA_URL}
      WEBHOOK_MONITORAMENTO_IMPORTACAO_CONTRIBUICOES_URL: ${WEBHOOK_MONITORAMENTO_IMPORTACAO_CONTRIBUICOES_URL}
      WEBHOOK_MONITORAMENTO_IMPORTACAO_FISCAL_URL: ${WEBHOOK_MONITORAMENTO_IMPORTACAO_FISCAL_URL}
      WEBHOOK_MONITORAMENTO_CONSULTA_URL: ${WEBHOOK_MONITORAMENTO_CONSULTA_URL}
      WEBHOOK_IMPORTACAO_XML_URL: ${WEBHOOK_IMPORTACAO_XML_URL}
      WEBHOOK_CONSULTAS_LOTES_URL: ${WEBHOOK_CONSULTAS_LOTES_URL}
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

networks:
  network_public:
    external: true

volumes:
  app_storage:
    external: true
