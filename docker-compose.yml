name: fiscaldock

services:
  app:
    image: felipedaige/fiscaldock:0.0.8-arm64
    restart: unless-stopped
    networks:
      - traefik-public
      - postgres-internal
    volumes:
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro
      - /var/www/html/resources:/var/www/html/resources
      - /var/www/html/routes:/var/www/html/routes
      - /var/www/html/app:/var/www/html/app
      - /var/www/html/config:/var/www/html/config
      - /var/www/html/database:/var/www/html/database
      - /var/www/html/public/js:/var/www/html/public/js
      - /var/www/html/public/css:/var/www/html/public/css
      - /var/www/html/public/build:/var/www/html/public/build
      - ./.env:/var/www/html/.env:ro
      - app_storage:/var/www/html/storage
      - ./storage/logs:/var/www/html/storage/logs
      - ./opcache-dev.ini:/usr/local/etc/php/conf.d/zz-opcache-dev.ini:ro
    environment:
      TZ: America/Sao_Paulo
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://fiscaldock.com.br}
      ASSET_URL: ${ASSET_URL:-https://fiscaldock.com.br}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-fiscaldock}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: ${CACHE_STORE:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-fiscaldock.com.br,www.fiscaldock.com.br}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_TOKEN: ${API_TOKEN}
      WEBHOOK_SPED_CONTRIBUICOES_URL: ${WEBHOOK_SPED_CONTRIBUICOES_URL}
      WEBHOOK_SPED_FISCAL_URL: ${WEBHOOK_SPED_FISCAL_URL}
      WEBHOOK_SPED_CONTRIBUICOES_COMPLETA_URL: ${WEBHOOK_SPED_CONTRIBUICOES_COMPLETA_URL}
      WEBHOOK_SPED_FISCAL_COMPLETA_URL: ${WEBHOOK_SPED_FISCAL_COMPLETA_URL}
      WEBHOOK_MONITORAMENTO_IMPORTACAO_CONTRIBUICOES_URL: ${WEBHOOK_MONITORAMENTO_IMPORTACAO_CONTRIBUICOES_URL}
      WEBHOOK_MONITORAMENTO_IMPORTACAO_FISCAL_URL: ${WEBHOOK_MONITORAMENTO_IMPORTACAO_FISCAL_URL}
      WEBHOOK_MONITORAMENTO_CONSULTA_URL: ${WEBHOOK_MONITORAMENTO_CONSULTA_URL}
      WEBHOOK_IMPORTACAO_XML_URL: ${WEBHOOK_IMPORTACAO_XML_URL}
      WEBHOOK_CONSULTAS_NOTAS_URL: ${WEBHOOK_CONSULTAS_NOTAS_URL}
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.fiscaldock-main-http.rule=Host(`fiscaldock.com.br`)"
      - "traefik.http.routers.fiscaldock-main-http.entrypoints=web"
      - "traefik.http.routers.fiscaldock-main-http.middlewares=redirect-to-https"
      - "traefik.http.routers.fiscaldock-main-http.service=fiscaldock-service"
      - "traefik.http.routers.fiscaldock-www-http.rule=Host(`www.fiscaldock.com.br`)"
      - "traefik.http.routers.fiscaldock-www-http.entrypoints=web"
      - "traefik.http.routers.fiscaldock-www-http.middlewares=redirect-to-https"
      - "traefik.http.routers.fiscaldock-www-http.service=fiscaldock-service"
      - "traefik.http.routers.fiscaldock-main.rule=Host(`fiscaldock.com.br`)"
      - "traefik.http.routers.fiscaldock-main.entrypoints=websecure"
      - "traefik.http.routers.fiscaldock-main.tls=true"
      - "traefik.http.routers.fiscaldock-main.tls.certresolver=letsencrypt"
      - "traefik.http.routers.fiscaldock-main.service=fiscaldock-service"
      - "traefik.http.routers.fiscaldock-www.rule=Host(`www.fiscaldock.com.br`)"
      - "traefik.http.routers.fiscaldock-www.entrypoints=websecure"
      - "traefik.http.routers.fiscaldock-www.tls=true"
      - "traefik.http.routers.fiscaldock-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.fiscaldock-www.middlewares=www-to-nonwww"
      - "traefik.http.routers.fiscaldock-www.service=fiscaldock-service"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      - "traefik.http.middlewares.www-to-nonwww.redirectregex.regex=^https://www\\.fiscaldock\\.com\\.br(.*)"
      - "traefik.http.middlewares.www-to-nonwww.redirectregex.replacement=https://fiscaldock.com.br$$1"
      - "traefik.http.middlewares.www-to-nonwww.redirectregex.permanent=true"
      - "traefik.http.services.fiscaldock-service.loadbalancer.server.port=80"

  scheduler:
    image: felipedaige/fiscaldock:0.0.8-arm64
    restart: unless-stopped
    command: php artisan schedule:work
    networks:
      - postgres-internal
    volumes:
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro
      - /var/www/html/app:/var/www/html/app
      - /var/www/html/config:/var/www/html/config
      - /var/www/html/database:/var/www/html/database
      - /var/www/html/routes:/var/www/html/routes
      - ./.env:/var/www/html/.env:ro
      - app_storage:/var/www/html/storage
      - ./storage/logs:/var/www/html/storage/logs
    environment:
      TZ: America/Sao_Paulo
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://fiscaldock.com.br}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-fiscaldock}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: ${CACHE_STORE:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-fiscaldock.com.br,www.fiscaldock.com.br}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_TOKEN: ${API_TOKEN}
      WEBHOOK_SPED_CONTRIBUICOES_URL: ${WEBHOOK_SPED_CONTRIBUICOES_URL}
      WEBHOOK_SPED_FISCAL_URL: ${WEBHOOK_SPED_FISCAL_URL}
      WEBHOOK_SPED_CONTRIBUICOES_COMPLETA_URL: ${WEBHOOK_SPED_CONTRIBUICOES_COMPLETA_URL}
      WEBHOOK_SPED_FISCAL_COMPLETA_URL: ${WEBHOOK_SPED_FISCAL_COMPLETA_URL}
      WEBHOOK_MONITORAMENTO_IMPORTACAO_CONTRIBUICOES_URL: ${WEBHOOK_MONITORAMENTO_IMPORTACAO_CONTRIBUICOES_URL}
      WEBHOOK_MONITORAMENTO_IMPORTACAO_FISCAL_URL: ${WEBHOOK_MONITORAMENTO_IMPORTACAO_FISCAL_URL}
      WEBHOOK_MONITORAMENTO_CONSULTA_URL: ${WEBHOOK_MONITORAMENTO_CONSULTA_URL}
      WEBHOOK_IMPORTACAO_XML_URL: ${WEBHOOK_IMPORTACAO_XML_URL}
      WEBHOOK_CONSULTAS_NOTAS_URL: ${WEBHOOK_CONSULTAS_NOTAS_URL}
    depends_on:
      - app

  worker:
    image: felipedaige/fiscaldock:0.0.8-arm64
    restart: unless-stopped
    # timeout=600: Due Diligence (1 alvo) leva ~3min por causa do throttle InfoSimples
    # (1 req/s) + latência das fontes gov. tries=3 é seguro: o job é idempotente em retry
    # (ProcessarConsultaJob pula fontes já persistidas, não re-cobra). Ver project memory.
    command: php artisan queue:work --verbose --tries=3 --timeout=600
    networks:
      - postgres-internal
    volumes:
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro
      # Código vivo (mesmo mount seletivo do serviço app) — sem isso o worker roda
      # o código antigo da imagem e jobs novos viram __PHP_Incomplete_Class.
      # vendor/ vem da imagem.
      - /var/www/html/resources:/var/www/html/resources
      - /var/www/html/routes:/var/www/html/routes
      - /var/www/html/app:/var/www/html/app
      - /var/www/html/config:/var/www/html/config
      - /var/www/html/database:/var/www/html/database
      - ./.env:/var/www/html/.env:ro
      - app_storage:/var/www/html/storage
      - ./storage/logs:/var/www/html/storage/logs
    environment:
      TZ: America/Sao_Paulo
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-fiscaldock}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - app
    profiles:
      - worker

  mailpit:
    image: axllent/mailpit:v1.30.3
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
    volumes:
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro
    networks:
      - postgres-internal
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"

  # Runner de TESTE e LINT (pest/pint). Não serve tráfego: fica dormindo e recebe `docker exec`.
  # A imagem de produção instala o vendor com --no-dev (não tem pest/pint), por isso este serviço
  # usa a imagem `dev` local, que traz as devDependencies.
  #
  #   docker exec fiscaldock-app-test-1 sh -c './vendor/bin/pest <arquivos|dirs>'
  #   docker exec fiscaldock-app-test-1 sh -c './vendor/bin/pint <arquivos>'
  #
  # `profiles: [test]` impede que um `docker compose up -d` de produção quebre caso a imagem dev
  # não exista na máquina; `restart: unless-stopped` garante que, uma vez criado, ele volte sozinho
  # depois de reboot. Criar/recriar:  docker compose --profile test up -d app-test
  app-test:
    image: fiscaldock:dev-arm64
    restart: unless-stopped
    command: sh -c "sleep infinity"
    networks:
      - postgres-internal
    volumes:
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro
      - /var/www/html/app:/var/www/html/app
      - /var/www/html/config:/var/www/html/config
      - /var/www/html/database:/var/www/html/database
      - /var/www/html/routes:/var/www/html/routes
      - /var/www/html/resources:/var/www/html/resources
      - /var/www/html/tests:/var/www/html/tests
      - /var/www/html/public/js:/var/www/html/public/js
      - /var/www/html/public/css:/var/www/html/public/css
      - /var/www/html/public/build:/var/www/html/public/build
      # SÓ o arquivo bootstrap/app.php — montar o diretório arrastaria bootstrap/cache (config
      # cacheada, views compiladas) e quebraria o boot. Sem este mount a imagem fica stale e
      # mudanças de middleware viram "regressões" falsas (ex.: AuthSecurityTest).
      - /var/www/html/bootstrap/app.php:/var/www/html/bootstrap/app.php:ro
      # Bind de ARQUIVO: um save atômico no host troca o inode e o container para de ver as
      # mudanças. Depois de editar o phpunit.xml, recriar:
      #   docker compose --profile test up -d --force-recreate app-test
      - /var/www/html/phpunit.xml:/var/www/html/phpunit.xml:ro
      - ./.env:/var/www/html/.env:ro
      - ./storage/logs:/var/www/html/storage/logs
    environment:
      # O Dotenv do Laravel é IMUTÁVEL: variáveis reais de ambiente VENCEM o .env montado acima.
      # É assim que isolamos o teste do .env de produção sem precisar de um .env.testing paralelo.
      TZ: America/Sao_Paulo
      APP_ENV: testing
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      # TRAVA DE SEGURANÇA: sem isto, `artisan tinker/migrate` neste container cai no banco REAL
      # (o phpunit.xml só força o banco durante a suíte, não em comandos avulsos).
      DB_DATABASE: fiscaldock_test
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      LOG_LEVEL: debug
      # Toggles OPERACIONAIS de produção não podem vazar pro teste (uma fonte pausada em prod
      # sumia do catálogo e derrubava testes que a esperavam disponível).
      CONSULTAS_INFOSIMPLES_ATIVO: "false"
      CONSULTAS_INFOSIMPLES_TESTE_CNPJS: ""
      CONSULTAS_FONTES_PAUSADAS: ""
    profiles:
      - test

volumes:
  app_storage:
    external: true

networks:
  traefik-public:
    external: true
  postgres-internal:
    external: true
