version: "3.8"

services:
  app:
    image: fiscaldock-app:latest
    environment:
      APP_ENV: "local"
      APP_DEBUG: "true"
      SESSION_DRIVER: "file"
      CACHE_STORE: "array"
      QUEUE_CONNECTION: "sync"
    ports:
      - "8080:80"
    volumes:
      - ./resources:/var/www/html/resources
      - ./public/js:/var/www/html/public/js
      - ./app:/var/www/html/app
      - app_storage:/var/www/html/storage
      - ./docker/php/opcache-dev.ini:/usr/local/etc/php/conf.d/99-opcache.ini:ro
    networks:
      - devnet

  scheduler:
    image: fiscaldock-app:latest
    command: php artisan schedule:work
    environment:
      APP_ENV: "local"
      APP_DEBUG: "true"
      SESSION_DRIVER: "file"
      CACHE_STORE: "array"
      QUEUE_CONNECTION: "sync"
    depends_on:
      - app
    networks:
      - devnet

networks:
  devnet:
    driver: bridge

volumes:
  app_storage:
    external: true
