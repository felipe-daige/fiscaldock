services:
  app:
    image: felipedaige/fiscaldock:1.0.6
    restart: unless-stopped
    networks:
      - devnet
    extra_hosts:
      - "postgres:172.19.0.1"
    volumes:
      - ./:/var/www/html
      - app_storage:/var/www/html/storage
      - ./storage/logs:/var/www/html/storage/logs  # Mapeia logs para o host
      - vendor_cache:/var/www/html/vendor
      - ./docker/php/opcache-dev.ini:/usr/local/etc/php/conf.d/99-opcache.ini:ro
    environment:
      APP_ENV: "local"
      APP_DEBUG: "true"
      APP_URL: "http://localhost:8080"
      ASSET_URL: "http://localhost:8080"
      APP_KEY: "REMOVED_APP_KEY"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: fiscaldock
      DB_USERNAME: postgres
      DB_PASSWORD: REMOVED_PASSWORD
      CACHE_STORE: database
      SESSION_DRIVER: database
      SESSION_LIFETIME: "120"
      QUEUE_CONNECTION: sync
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TRUSTED_PROXIES: "*"
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
    ports:
      - "8080:80"
    deploy: null

  scheduler:
    image: felipedaige/fiscaldock:1.0.6
    restart: unless-stopped
    networks:
      - devnet
    extra_hosts:
      - "postgres:172.19.0.1"
    depends_on:
      - app
    volumes:
      - app_storage:/var/www/html/storage
      - ./storage/logs:/var/www/html/storage/logs  # Mapeia logs para o host
    command: php artisan schedule:work
    environment:
      APP_ENV: "local"
      APP_DEBUG: "true"
      APP_URL: "http://localhost:8080"
      APP_KEY: "REMOVED_APP_KEY"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: fiscaldock
      DB_USERNAME: postgres
      DB_PASSWORD: REMOVED_PASSWORD
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: sync
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
    deploy: null

  worker:
    image: felipedaige/fiscaldock:1.0.6
    restart: unless-stopped
    networks:
      - devnet
    extra_hosts:
      - "postgres:172.19.0.1"
    depends_on:
      - app
    volumes:
      - app_storage:/var/www/html/storage
      - ./storage/logs:/var/www/html/storage/logs  # Mapeia logs para o host
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    environment:
      APP_ENV: "local"
      APP_DEBUG: "true"
      APP_URL: "http://localhost:8080"
      APP_KEY: "REMOVED_APP_KEY"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: fiscaldock
      DB_USERNAME: postgres
      DB_PASSWORD: REMOVED_PASSWORD
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: sync
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
    profiles:
      - worker  # Só sobe se usar: docker compose --profile worker up

networks:
  devnet:
    driver: bridge

volumes:
  app_storage:
    external: true
    name: app_storage
  vendor_cache:
    external: true
    name: hub_contabil_vendor_cache
